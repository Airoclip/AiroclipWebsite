      <p>Children are not permitted to use these Services, and we do not knowingly collect any personal information from children. Though our Services are not intended for children as the primary audience, we may collect age information before allowing a user to proceed for certain Services. For users who identify themselves as children in our age-gate on such Services, if we allow children to use the Services, we will either provide a version of that Service that does not collect, use, or disclose "personal information" (as defined in the Children's Online Privacy Protection Act ("COPPA")), except as permitted by COPPA or other privacy laws (where applicable), or obtain legally valid parental consent in accordance with relevant regulations.</p>

      <h3>How to exercise your rights</h3>
