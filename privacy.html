<link rel="stylesheet" href="styles/shared.css" />
<link rel="stylesheet" href="styles/adaptive.css" />
<style>
  body { background: #07070a; }
  .legal-wrap { max-width: 880px; margin: 0 auto; padding: 80px 40px 100px; }
  .legal-wrap h1 { font-family: 'Instrument Serif', serif; font-size: clamp(48px, 6vw, 80px); line-height: 1; letter-spacing: -0.03em; font-weight: 400; color: #fff; }
  .legal-wrap .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.14em; margin: 18px 0 48px; }
  .legal-wrap h2 { font-family: 'Inter Tight', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 48px 0 16px; color: #fff; }
  .legal-wrap h3 { font-family: 'Inter Tight', sans-serif; font-size: 16px; font-weight: 600; margin: 28px 0 10px; color: #fff; }
  .legal-wrap p, .legal-wrap li { font-size: 15px; line-height: 1.65; color: rgba(255,255,255,0.72); margin-bottom: 12px; }
  .legal-wrap ul, .legal-wrap ol { padding-left: 22px; margin-bottom: 16px; }
  .legal-wrap a { color: #6f8bff; text-decoration: underline; text-underline-offset: 3px; }
  .toc { padding: 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; margin-bottom: 48px; }
  .toc h4 { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.5); margin-bottom: 12px; font-weight: 500; }
  .toc ol { padding-left: 18px; margin: 0; }
  .toc li { font-size: 14px; margin-bottom: 6px; }
  .toc a { color: rgba(255,255,255,0.85); text-decoration: none; }
  .toc a:hover { color: #6f8bff; }
  @media (max-width: 700px) { .legal-wrap { padding: 60px 24px 80px; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel">
function LegalPage({ title, lastUpdated, toc, children }) {
  return (
    <div className="adaptive">
      <nav className="nav">
        <a href="index.html" className="nav-logo"><span className="mark"><AiroLogoMark size={16} /></span><span>airoclip</span></a>
        <div className="nav-links">
          <a href="index.html#tech">Technology</a>
          <a href="index.html#games">Games</a>
          <a href="index.html#investors">Investors</a>
          <a href="careers.html">Careers</a>
        </div>
        <div><a href="careers.html" className="btn btn-primary">We're hiring →</a></div>
      </nav>
      <div className="legal-wrap">
        <h1>{title}</h1>
        <div className="meta">Last updated · {lastUpdated} · Airoclip Technologies Pvt. Ltd.</div>
        <div className="toc">
          <h4>Contents</h4>
          <ol>{toc.map((t, i) => <li key={i}><a href={`#s${i+1}`}>{t}</a></li>)}</ol>
        </div>
        {children}
      </div>
      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-top">
            <div className="footer-brand">
              <a href="index.html" className="nav-logo"><span className="mark"><AiroLogoMark size={16} /></span><span>airoclip</span></a>
              <p>Crafting personalized gaming experiences. Built from Bengaluru.</p>
              <div className="footer-socials" style={{marginTop: 20}}>
                <a href="#"><Social.X /></a><a href="#"><Social.In /></a><a href="#"><Social.Yt /></a><a href="#"><Social.Ig /></a>
              </div>
            </div>
            <div className="footer-col"><h5>Studio</h5><a href="index.html#tech">Technology</a><a href="index.html#games">Games</a><a href="index.html#investors">Investors</a><a href="careers.html">Careers</a></div>
            <div className="footer-col"><h5>Games</h5><a href="games/hexa-dreams.html">Hexa Dreams</a><a href="games/tap-hexa.html">Tap Hexa</a></div>
            <div className="footer-col"><h5>Company</h5><a href="mailto:info@airoclip.com">Contact</a><a href="mailto:info@airoclip.com">Press</a></div>
            <div className="footer-col"><h5>Legal</h5><a href="privacy.html">Privacy Policy</a><a href="terms.html">Terms of Service</a><a href="ads.txt">ads.txt</a></div>
          </div>
          <div className="footer-bottom">
            <div>© 2025 Airoclip Technologies Pvt. Ltd. — Bengaluru, India</div>
            <div className="footer-legal"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="mailto:info@airoclip.com">info@airoclip.com</a></div>
          </div>
        </div>
      </footer>
    </div>
  );
}

const TOC = ["Overview", "Information we collect", "How we use information", "Sharing & disclosure", "Advertising & analytics", "Children's privacy", "Your rights & choices", "Data retention & security", "International transfers", "Changes to this policy", "Contact us"];

function Privacy() {
  return (
    <LegalPage title="Privacy Policy" lastUpdated="October 26, 2025" toc={TOC}>
      <h2 id="s1">1. Overview</h2>
      <p>Airoclip Technologies Pvt. Ltd. ("Airoclip", "we", "us", or "our") operates the airoclip.com website and mobile games including Hexa Dreams and Tap Hexa (collectively, the "Services"). This Privacy Policy explains what information we collect, how we use it, and the choices you have. By using our Services, you agree to the collection and use of information in accordance with this policy.</p>

      <h2 id="s2">2. Information we collect</h2>
      <h3>Information you provide</h3>
      <p>When you contact us, apply for a job, or sign up for a newsletter, you may share information such as your name, email address, and message content.</p>
      <h3>Information collected automatically</h3>
      <ul>
        <li><strong>Device & technical data</strong> — device model, operating system, language, time zone, mobile network, IP address, and unique identifiers such as advertising IDs (IDFA / GAID).</li>
        <li><strong>Gameplay data</strong> — levels played, in-game choices, session length, progression, and other interactions used to power our personalization engine.</li>
        <li><strong>Crash & diagnostic data</strong> — to help us identify and fix issues.</li>
      </ul>

      <h2 id="s3">3. How we use information</h2>
      <ul>
        <li>To operate, maintain, and improve our Services.</li>
        <li>To personalize gameplay — including adapting difficulty, story progression, and content to each player.</li>
        <li>To deliver and measure the performance of advertising shown within our games.</li>
        <li>To communicate with you about updates, new releases, or job applications.</li>
        <li>To detect, prevent, and address technical issues, fraud, and abuse.</li>
        <li>To comply with applicable law.</li>
      </ul>

      <h2 id="s4">4. Sharing & disclosure</h2>
      <p>We do not sell your personal information. We share information only with:</p>
      <ul>
        <li><strong>Service providers</strong> — analytics, cloud hosting, customer support, and crash reporting partners that process data on our behalf.</li>
        <li><strong>Advertising partners</strong> — to serve and measure ads inside our games (see Section 5).</li>
        <li><strong>Legal & safety</strong> — when required to comply with law, enforce our terms, or protect rights and safety.</li>
        <li><strong>Business transfers</strong> — in connection with a merger, acquisition, or sale of assets, with appropriate notice.</li>
      </ul>

      <h2 id="s5">5. Advertising & analytics</h2>
      <p>Our games may display third-party advertisements. Advertising partners may use cookies, advertising IDs, and similar technologies to deliver relevant ads and measure their effectiveness. The list of authorized digital sellers we work with for advertising is published at <a href="ads.txt">airoclip.com/ads.txt</a>. You can opt out of personalized advertising using your device settings: <em>Limit Ad Tracking</em> on iOS or <em>Opt out of Ads Personalization</em> on Android.</p>

      <h2 id="s6">6. Children's privacy</h2>
      <p>Our Services are not directed to children under 13 (or the equivalent minimum age in your jurisdiction). We do not knowingly collect personal information from children. If you believe a child has provided us with personal data, please contact us at <a href="mailto:privacy@airoclip.com">privacy@airoclip.com</a> so we can delete it.</p>

      <h2 id="s7">7. Your rights & choices</h2>
      <p>Depending on your location, you may have the right to access, correct, delete, or port your personal information, and to object to or restrict certain processing. To exercise these rights, email us at <a href="mailto:privacy@airoclip.com">privacy@airoclip.com</a>. EU/UK residents may also lodge a complaint with their local data protection authority.</p>

      <h2 id="s8">8. Data retention & security</h2>
      <p>We retain personal information only for as long as necessary to provide the Services and for legitimate business or legal purposes. We use industry-standard administrative, technical, and physical safeguards to protect your information.</p>

      <h2 id="s9">9. International transfers</h2>
      <p>We are headquartered in India and may transfer your information to countries outside your own. Where required, we use appropriate safeguards such as Standard Contractual Clauses.</p>

      <h2 id="s10">10. Changes to this policy</h2>
      <p>We may update this policy from time to time. The "Last updated" date at the top reflects when the latest changes were made. Material changes will be communicated through the Services.</p>

      <h2 id="s11">11. Contact us</h2>
      <p>Questions or requests? Email <a href="mailto:privacy@airoclip.com">privacy@airoclip.com</a> or write to: Airoclip Technologies Pvt. Ltd., Bengaluru, Karnataka, India.</p>
    </LegalPage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Privacy />);
</script>
</body>
</html>
